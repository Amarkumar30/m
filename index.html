<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Progress Tracker</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>EduTrack</span>
        </div>
        <ul class="nav-links">
            <li class="active" data-section="dashboard"><i class="fas fa-home"></i> Dashboard</li>
            <li data-section="quizzes"><i class="fas fa-vial"></i> Quizzes</li>
            <li data-section="exams"><i class="fas fa-file-alt"></i> Exams</li>
            <li data-section="todo"><i class="fas fa-list-check"></i> To-Do List</li>
            <li data-section="monthly"><i class="fas fa-calendar-alt"></i> Monthly Planner</li>
            <li data-section="yearly"><i class="fas fa-calendar"></i> Yearly Planner</li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <h1 id="section-title">Dashboard</h1>
            <div class="user-info">
                <span id="current-date"></span>
            </div>
        </header>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Upcoming Quizzes</h3>
                    <p id="quiz-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Upcoming Exams</h3>
                    <p id="exam-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending Tasks</h3>
                    <p id="task-count">0</p>
                </div>
            </div>
            <div class="recent-activity">
                <h2>Recent Scores</h2>
                <div id="recent-scores-list" class="list-container">
                    <!-- Scores will be populated here -->
                </div>
            </div>
        </section>

        <!-- Quizzes Section -->
        <section id="quizzes" class="section">
            <div class="section-header">
                <h2>Manage Quizzes</h2>
                <button class="btn-add" onclick="showModal('quiz-modal')"><i class="fas fa-plus"></i> Add Quiz</button>
            </div>
            <div id="quizzes-list" class="grid-container">
                <!-- Quizzes will be populated here -->
            </div>
        </section>

        <!-- Exams Section -->
        <section id="exams" class="section">
            <div class="section-header">
                <h2>Manage Exams</h2>
                <button class="btn-add" onclick="showModal('exam-modal')"><i class="fas fa-plus"></i> Add Exam</button>
            </div>
            <div id="exams-list" class="grid-container">
                <!-- Exams will be populated here -->
            </div>
        </section>

        <!-- To-Do List Section -->
        <section id="todo" class="section">
            <div class="section-header">
                <h2>To-Do List</h2>
                <div class="add-todo">
                    <input type="text" id="todo-input" placeholder="Add a new task...">
                    <button onclick="addTodo()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <ul id="todo-list" class="list-container">
                <!-- Tasks will be populated here -->
            </ul>
        </section>

        <!-- Monthly Planner Section -->
        <section id="monthly" class="section">
            <div class="section-header">
                <h2 id="month-display">Month Year</h2>
                <div class="calendar-nav">
                    <button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Calendar will be generated here -->
            </div>
        </section>

        <!-- Yearly Planner Section -->
        <section id="yearly" class="section">
            <div class="section-header">
                <h2>Yearly Overview</h2>
            </div>
            <div id="yearly-grid" class="yearly-grid">
                <!-- Yearly months will be generated here -->
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <h3>Add New Quiz</h3>
            <form id="quiz-form">
                <input type="text" id="quiz-subject" placeholder="Subject" required>
                <input type="date" id="quiz-date" required>
                <input type="text" id="quiz-topic" placeholder="Topic">
                <div class="modal-actions">
                    <button type="button" onclick="hideModal('quiz-modal')">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="exam-modal" class="modal">
        <div class="modal-content">
            <h3>Add New Exam</h3>
            <form id="exam-form">
                <input type="text" id="exam-subject" placeholder="Subject" required>
                <input type="date" id="exam-date" required>
                <input type="text" id="exam-location" placeholder="Location/Room">
                <div class="modal-actions">
                    <button type="button" onclick="hideModal('exam-modal')">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-content">
            <h3>Input Score</h3>
            <form id="score-form">
                <input type="hidden" id="score-item-id">
                <input type="hidden" id="score-item-type">
                <input type="number" id="score-value" placeholder="Score (e.g. 85)" required>
                <input type="number" id="score-total" placeholder="Total Marks (e.g. 100)" required>
                <div class="modal-actions">
                    <button type="button" onclick="hideModal('score-modal')">Cancel</button>
                    <button type="submit">Save Score</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
